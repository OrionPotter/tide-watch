<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>学习 · Tidewatch</title>
    <link href="https://cdn.bootcdn.net/ajax/libs/twitter-bootstrap/5.3.1/css/bootstrap.min.css" rel="stylesheet">
    <link href="/static/styles.css" rel="stylesheet">
</head>
<body>
<div class="app-shell">
    <section class="hero">
        <div class="hero-head">
            <div class="hero-title">
                <h1>Price Action 学习</h1>
            </div>
        </div>
        <div class="nav-pills-bar">
            <a class="nav-chip" href="/">首页</a>
            <a class="nav-chip" href="/monitor">监控</a>
            <a class="nav-chip" href="/tools">工具</a>
            <a class="nav-chip" href="/xueqiu">组合</a>
            <a class="nav-chip" href="/analysis">分析</a>
            <a class="nav-chip is-active" href="/learn">学习</a>
            <a class="nav-chip" href="/admin">管理</a>
        </div>
    </section>

    <section class="surface section">
        <div class="section-title">
            <div>
                <h3>教程目录</h3>
            </div>
            <div class="toolbar-summary" id="learn-count">加载中...</div>
        </div>
        <div id="learn-groups" class="learn-groups">
            <div class="empty-state">正在加载文章...</div>
        </div>
    </section>
</div>

<script>
function getChapterKey(article) {
    const sourceName = article.source_name || '';
    const match = sourceName.match(/^(\d{2})/);
    return match ? match[1] : '00';
}

function getChapterLabel(article) {
    const sourceName = article.source_name || '';
    const match = sourceName.match(/^(\d{2}[A-Z]?)[\s-]+(.+)\.md$/i);
    if (!match) {
        return '附录';
    }
    return `Chapter ${match[1]} · ${match[2]}`;
}

function getThemeClass(chapterIndex) {
    const themes = [
        'theme-indigo',
        'theme-cyan',
        'theme-amber',
        'theme-emerald',
        'theme-rose',
        'theme-slate',
    ];
    return themes[chapterIndex % themes.length];
}

function buildGroups(articles) {
    const grouped = [];
    const byKey = new Map();

    articles.forEach(article => {
        const key = getChapterKey(article);
        if (!byKey.has(key)) {
            const group = {
                key,
                label: getChapterLabel(article),
                articles: [],
            };
            byKey.set(key, group);
            grouped.push(group);
        }
        byKey.get(key).articles.push(article);
    });

    return grouped;
}

async function loadLearnIndex() {
    const container = document.getElementById('learn-groups');
    try {
        const response = await fetch('/api/learn');
        const result = await response.json();
        if (result.status !== 'success') {
            throw new Error('加载失败');
        }

        const articles = (result.data && result.data.articles) || [];
        document.getElementById('learn-count').textContent = `${articles.length} 篇文章`;

        if (!articles.length) {
            container.innerHTML = '<div class="empty-state">暂无学习文章</div>';
            return;
        }

        const groups = buildGroups(articles);
        container.innerHTML = groups.map((group, index) => `
            <section class="learn-group">
                <div class="learn-group-head">
                    <div>
                        <h4>${group.label}</h4>
                        <div class="learn-group-meta">${group.articles.length} 篇</div>
                    </div>
                </div>
                <div class="learn-grid">
                    ${group.articles.map(article => `
                        <a class="learn-card ${getThemeClass(index)}" href="/learn/${article.slug}">
                            <div class="learn-card-order mono">#${article.order}</div>
                            <h5>${article.title}</h5>
                            <div class="learn-card-meta">${article.source_name}</div>
                        </a>
                    `).join('')}
                </div>
            </section>
        `).join('');
    } catch (error) {
        console.error(error);
        document.getElementById('learn-count').textContent = '加载失败';
        container.innerHTML = '<div class="empty-state text-danger">文章列表加载失败</div>';
    }
}

document.addEventListener('DOMContentLoaded', loadLearnIndex);
</script>
</body>
</html>

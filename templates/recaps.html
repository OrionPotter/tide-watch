<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>复盘 - Tidewatch</title>
    <link href="https://cdn.bootcdn.net/ajax/libs/twitter-bootstrap/5.3.1/css/bootstrap.min.css" rel="stylesheet">
    <link href="/static/styles.css" rel="stylesheet">
</head>
<body>
<div class="app-shell">
    <section class="hero">
        <div class="hero-head">
            <div class="hero-title">
                <h1>交易复盘</h1>
            </div>
        </div>
        <div class="nav-pills-bar">
            <a class="nav-chip" href="/">首页</a>
            <a class="nav-chip" href="/monitor">监控</a>
            <a class="nav-chip" href="/tools">工具</a>
            <a class="nav-chip" href="/xueqiu">组合</a>
            <a class="nav-chip" href="/analysis">分析</a>
            <a class="nav-chip is-active" href="/recaps">复盘</a>
            <a class="nav-chip" href="/learn">学习</a>
            <a class="nav-chip" href="/admin">管理</a>
        </div>
    </section>

    <section class="surface section section-table">
        <div class="section-title">
            <div>
                <h3>复盘列表</h3>
            </div>
            <div class="recap-list-toolbar">
                <div class="toolbar-summary" id="recap-count">加载中...</div>
                <a class="btn btn-primary" href="/recaps/new">创建复盘</a>
            </div>
        </div>
        <div class="table-wrap">
            <table class="table-modern recap-table">
                <thead>
                    <tr>
                        <th>时间</th>
                        <th>股票</th>
                        <th>策略</th>
                        <th class="text-end">盈亏比</th>
                        <th class="text-center">结果</th>
                        <th>失败原因</th>
                        <th class="text-center">截图</th>
                        <th class="text-end">操作</th>
                    </tr>
                </thead>
                <tbody id="recap-table-body">
                    <tr><td colspan="8" class="empty-state">正在加载复盘记录...</td></tr>
                </tbody>
            </table>
        </div>
    </section>
</div>

<script src="/static/ui.js"></script>
<script>
function escapeHtml(value) {
    return String(value || '')
        .replaceAll('&', '&amp;')
        .replaceAll('<', '&lt;')
        .replaceAll('>', '&gt;')
        .replaceAll('"', '&quot;')
        .replaceAll("'", '&#39;');
}

function formatBool(value) {
    return value ? '成功' : '失败';
}

function formatFailureReason(record) {
    if (record.is_success) {
        return '<span class="text-muted">-</span>';
    }
    return escapeHtml(record.failure_reason || '未填写');
}

async function loadRecaps() {
    const tbody = document.getElementById('recap-table-body');
    try {
        const response = await fetch('/api/recaps');
        const result = await response.json();
        if (result.status !== 'success') {
            throw new Error('加载失败');
        }
        const records = result.data.records || [];
        document.getElementById('recap-count').textContent = `${records.length} 条记录`;
        if (!records.length) {
            tbody.innerHTML = '<tr><td colspan="8" class="empty-state">暂无复盘记录</td></tr>';
            return;
        }
        tbody.innerHTML = records.map(record => `
            <tr>
                <td class="mono">${escapeHtml(record.review_date)}</td>
                <td>
                    <a class="recap-link" href="/recaps/${record.id}">
                        <strong>${escapeHtml(record.stock_name)}</strong>
                    </a>
                    <div class="text-muted small mono">${escapeHtml(record.stock_code || '-')}</div>
                </td>
                <td>${escapeHtml(record.strategy_tag || '未分类')}</td>
                <td class="text-end mono">${record.risk_reward_ratio ?? '-'}</td>
                <td class="text-center">
                    <span class="badge-soft ${record.is_success ? 'badge-success-soft' : 'badge-danger-soft'}">${formatBool(record.is_success)}</span>
                </td>
                <td class="recap-failure-cell">${formatFailureReason(record)}</td>
                <td class="text-center">${record.image_path ? '<span class="badge-soft badge-primary-soft">有</span>' : '<span class="badge-soft badge-gray-soft">无</span>'}</td>
                <td class="text-end">
                    <div class="recap-row-actions">
                        <a class="btn btn-sm btn-outline-secondary" href="/recaps/${record.id}">详情</a>
                        <div class="recap-action-menu">
                            <button class="btn btn-sm btn-outline-primary recap-menu-trigger" type="button">编辑</button>
                            <div class="recap-action-dropdown d-none">
                                <a class="dropdown-item" href="/recaps/${record.id}/edit">更新</a>
                                <button class="dropdown-item is-danger" type="button" onclick="deleteRecap(${record.id})">删除</button>
                            </div>
                        </div>
                    </div>
                </td>
            </tr>
        `).join('');
        bindRecapMenus();
    } catch (error) {
        console.error(error);
        tbody.innerHTML = '<tr><td colspan="8" class="empty-state text-danger">复盘记录加载失败</td></tr>';
        document.getElementById('recap-count').textContent = '加载失败';
    }
}

function closeRecapMenus() {
    document.querySelectorAll('.recap-action-dropdown').forEach(menu => menu.classList.add('d-none'));
}

function bindRecapMenus() {
    document.querySelectorAll('.recap-menu-trigger').forEach(button => {
        button.onclick = event => {
            event.preventDefault();
            event.stopPropagation();
            const menu = button.parentElement.querySelector('.recap-action-dropdown');
            const willOpen = menu.classList.contains('d-none');
            closeRecapMenus();
            if (willOpen) {
                menu.classList.remove('d-none');
            }
        };
    });
}

async function deleteRecap(id) {
    if (!window.confirm('确认删除这条复盘记录吗？')) {
        return;
    }
    try {
        const response = await fetch(`/api/recaps/${id}`, { method: 'DELETE' });
        const result = await response.json();
        if (result.status !== 'success') {
            throw new Error(result.detail || result.message || '删除失败');
        }
        showToast('复盘已删除', 'success');
        await loadRecaps();
    } catch (error) {
        console.error(error);
        showToast(error.message || '删除失败', 'error');
    }
}

document.addEventListener('click', closeRecapMenus);
document.addEventListener('DOMContentLoaded', loadRecaps);
</script>
</body>
</html>

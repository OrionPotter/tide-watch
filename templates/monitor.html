<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>监控看板 · Tidewatch</title>
    <link href="https://cdn.bootcdn.net/ajax/libs/twitter-bootstrap/5.3.1/css/bootstrap.min.css" rel="stylesheet">
    <link href="/static/styles.css" rel="stylesheet">
</head>
<body>
    <div class="app-shell">
        <section class="hero">
            <div class="hero-head">
                <div class="hero-title">
                    <h1>监控看板</h1>
                </div>
                <div class="hero-actions">
                    <span class="last-update" id="update-time">等待更新</span>
                    <button id="update-kline-btn" class="btn btn-warning">更新 K 线</button>
                    <button id="refresh-btn" class="btn btn-primary">刷新数据</button>
                </div>
            </div>
            <div class="nav-pills-bar">
                <a class="nav-chip" href="/">首页</a>
                <a class="nav-chip is-active" href="/monitor">监控</a>
                <a class="nav-chip" href="/tools">工具</a>
                <a class="nav-chip" href="/xueqiu">组合</a>
                <a class="nav-chip" href="/analysis">分析</a>
                <a class="nav-chip" href="/recaps">复盘</a>
                <a class="nav-chip" href="/learn">学习</a>
                <a class="nav-chip" href="/admin">管理</a>
            </div>
        </section>

        <section class="surface section">
            <div class="toolbar-row">
                <div class="filter-chips" id="filter-chips">
                    <button class="chip-btn is-active" data-filter="all">全部</button>
                    <button class="chip-btn" data-filter="holding">持仓</button>
                    <button class="chip-btn" data-filter="buy">接近买点</button>
                    <button class="chip-btn" data-filter="risk">风险</button>
                </div>
                <div class="toolbar-summary" id="summary-text">正在加载监控数据...</div>
            </div>
        </section>

        <section class="surface section">
            <div class="table-wrap">
                <table class="table-modern">
                    <thead>
                        <tr>
                            <th>股票</th>
                            <th class="text-end">现价</th>
                            <th class="text-end">合理区间</th>
                            <th class="text-center">估值</th>
                            <th class="text-center">趋势</th>
                            <th class="text-center">技术</th>
                            <th class="text-center">动作</th>
                            <th class="text-end">评分</th>
                        </tr>
                    </thead>
                    <tbody id="monitor-body"><tr><td colspan="8" class="empty-state">正在加载数据...</td></tr></tbody>
                </table>
            </div>
        </section>
    </div>

    <script src="/static/ui.js"></script>
    <script>
        let allRows = [];
        let activeFilter = 'all';

        function formatMoney(num) {
            if (num === undefined || num === null || Number.isNaN(num)) return '-';
            return num.toLocaleString('zh-CN', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
        }

        function badge(text, tone) {
            return `<span class="badge-soft ${tone}">${text}</span>`;
        }

        function valuationBadge(label) {
            if (label === '低估') return badge(label, 'badge-success-soft');
            if (label === '高估') return badge(label, 'badge-danger-soft');
            return badge(label || '中性', 'badge-gray-soft');
        }

        function trendBadge(label) {
            if (label === '多头') return badge(label, 'badge-success-soft');
            if (label === '空头') return badge(label, 'badge-danger-soft');
            return badge(label || '震荡', 'badge-gray-soft');
        }

        function actionBadge(label) {
            if (label === '可分批') return badge(label, 'badge-success-soft');
            if (label === '接近买点') return badge(label, 'badge-primary-soft');
            if (label === '风险') return badge(label, 'badge-warning-soft');
            if (label === '高估谨慎') return badge(label, 'badge-danger-soft');
            return badge(label || '观察', 'badge-gray-soft');
        }

        function filterRows(items) {
            if (activeFilter === 'all') return items;
            if (activeFilter === 'holding') return items.filter(item => item.is_holding);
            if (activeFilter === 'buy') return items.filter(item => ['可分批', '接近买点'].includes(item.action_label));
            if (activeFilter === 'risk') return items.filter(item => item.risk_level === 'high' || item.action_label === '风险');
            return items;
        }

        function renderSummary(items) {
            document.getElementById('summary-text').textContent = `共 ${items.length} 只监控股票`;
        }

        function renderTable() {
            const tbody = document.getElementById('monitor-body');
            const items = filterRows(allRows);
            if (!items.length) {
                tbody.innerHTML = '<tr><td colspan="8" class="empty-state">当前筛选条件下暂无数据</td></tr>';
                return;
            }
            tbody.innerHTML = items.map(item => `
                <tr>
                    <td><strong>${item.name}</strong><div class="text-muted small">${item.code}</div></td>
                    <td class="text-end mono">${formatMoney(item.current_price)}</td>
                    <td class="text-end mono">${formatMoney(item.reasonable_price_min)} - ${formatMoney(item.reasonable_price_max)}</td>
                    <td class="text-center">${valuationBadge(item.valuation_status)}</td>
                    <td class="text-center">${trendBadge(item.trend)}</td>
                    <td class="text-center">${badge(item.technical_status || '无信号', 'badge-gray-soft')}</td>
                    <td class="text-center">${actionBadge(item.action_label)}</td>
                    <td class="text-end mono">${item.score ?? '-'}</td>
                </tr>
            `).join('');
        }

        async function loadData() {
            const btn = document.getElementById('refresh-btn');
            btn.disabled = true;
            btn.innerHTML = '<span class="spinner-border spinner-border-sm"></span> 加载中';
            try {
                const response = await fetch('/api/monitor');
                const result = await response.json();
                if (result.status !== 'success') throw new Error('加载失败');
                allRows = result.stocks || [];
                renderSummary(allRows);
                renderTable();
                document.getElementById('update-time').textContent = `最后更新：${result.timestamp}`;
            } catch (error) {
                console.error(error);
                document.getElementById('monitor-body').innerHTML = '<tr><td colspan="8" class="empty-state text-danger">监控数据加载失败</td></tr>';
            } finally {
                btn.disabled = false;
                btn.innerHTML = '刷新数据';
            }
        }

        document.querySelectorAll('.chip-btn').forEach(button => {
            button.addEventListener('click', () => {
                activeFilter = button.dataset.filter;
                document.querySelectorAll('.chip-btn').forEach(item => item.classList.toggle('is-active', item === button));
                renderTable();
            });
        });

        document.addEventListener('DOMContentLoaded', loadData);
        document.getElementById('refresh-btn').addEventListener('click', loadData);
        document.getElementById('update-kline-btn').addEventListener('click', async () => {
            const btn = document.getElementById('update-kline-btn');
            btn.disabled = true;
            btn.innerHTML = '<span class="spinner-border spinner-border-sm"></span> 更新中';
            try {
                const response = await fetch('/api/monitor/update-kline', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ force_update: true })
                });
                const result = await response.json();
                if (result.status !== 'success') throw new Error('更新失败');
                showToast('K 线更新任务已启动', 'success');
                await loadData();
            } catch (error) {
                console.error(error);
                showToast('K 线更新失败', 'error');
            } finally {
                btn.disabled = false;
                btn.innerHTML = '更新 K 线';
            }
        });
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>雪球组合 · Tidewatch</title>
    <link href="https://cdn.bootcdn.net/ajax/libs/twitter-bootstrap/5.3.1/css/bootstrap.min.css" rel="stylesheet">
    <link href="/static/styles.css" rel="stylesheet">
</head>
<body>
<div class="app-shell">
    <section class="hero">
        <div class="hero-head">
            <div class="hero-title"><h1>雪球组合调仓记录</h1></div>
            <div class="hero-actions"><span class="last-update" id="update-time">等待更新</span><button id="refresh-btn" class="btn btn-primary">刷新数据</button></div>
        </div>
        <div class="nav-pills-bar">
            <a class="nav-chip" href="/">首页</a><a class="nav-chip" href="/monitor">监控</a><a class="nav-chip" href="/tools">工具</a><a class="nav-chip is-active" href="/xueqiu">参考组合</a><a class="nav-chip" href="/admin">管理</a>
        </div>
    </section>
    <section class="surface section">
        <div class="section-title"><div><h3>全部调仓记录</h3></div></div>
        <div class="table-wrap"><table class="table-modern"><thead><tr><th>组合</th><th>调仓时间</th><th>股票名称</th><th>股票代码</th><th class="text-center">操作</th><th class="text-end">仓位变化</th><th class="text-end">目标仓位</th><th class="text-end">价格</th></tr></thead><tbody id="all-records-body"><tr><td colspan="8" class="empty-state">正在加载数据...</td></tr></tbody></table></div>
    </section>
</div>
<script>
function formatPercent(num){ if(num===undefined||num===null) return '-'; return `${num.toFixed(2)}%`; }
async function loadData(){ const btn=document.getElementById('refresh-btn'); const tbody=document.getElementById('all-records-body'); btn.disabled=true; btn.innerHTML='<span class="spinner-border spinner-border-sm"></span> 加载中'; try{ const response=await fetch('/api/xueqiu'); const result=await response.json(); if(result.status!=='success') throw new Error('加载失败'); const cubesData=result.data; const cubeSymbols=Object.keys(cubesData); let allRecords=[]; cubeSymbols.forEach(cubeSymbol=>{ const history=cubesData[cubeSymbol]; const cubeName=history.length>0 ? history[0].cube_name : cubeSymbol; history.forEach(item=>{ (item.changes||[]).forEach(change=> allRecords.push({ cubeName, rebalancingTime:item.rebalancing_time, stockName:change.stock_name, stockSymbol:change.stock_symbol, action:change.action, change:change.change, targetWeight:change.target_weight, price:change.price })) }) }); allRecords.sort((a,b)=>new Date(b.rebalancingTime)-new Date(a.rebalancingTime)); if(!allRecords.length){ tbody.innerHTML='<tr><td colspan="8" class="empty-state">暂无调仓记录</td></tr>'; return; } tbody.innerHTML=''; allRecords.forEach(record=>{ const tone=record.action==='买入'?'badge-success-soft':'badge-danger-soft'; const changeClass=record.change>0?'status-positive':'status-negative'; const tr=document.createElement('tr'); tr.innerHTML=`<td><strong>${record.cubeName}</strong></td><td>${record.rebalancingTime}</td><td>${record.stockName}</td><td class="mono">${record.stockSymbol}</td><td class="text-center"><span class="badge-soft ${tone}">${record.action}</span></td><td class="text-end mono ${changeClass}">${record.change>0?'+':''}${formatPercent(record.change)}</td><td class="text-end mono">${formatPercent(record.targetWeight)}</td><td class="text-end mono">${record.price ? record.price.toFixed(2) : '-'}</td>`; tbody.appendChild(tr); }); document.getElementById('update-time').textContent=`最后更新：${result.timestamp}`; }catch(error){ console.error(error); tbody.innerHTML='<tr><td colspan="8" class="empty-state text-danger">数据加载失败</td></tr>'; }finally{ btn.disabled=false; btn.innerHTML='刷新数据'; }}
document.addEventListener('DOMContentLoaded',loadData); document.getElementById('refresh-btn').addEventListener('click',loadData);
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>投资工具 · Tidewatch</title>
    <link href="https://cdn.bootcdn.net/ajax/libs/twitter-bootstrap/5.3.1/css/bootstrap.min.css" rel="stylesheet">
    <link href="/static/styles.css" rel="stylesheet">
</head>
<body>
<div class="app-shell">
    <section class="hero">
        <div class="hero-head">
            <div class="hero-title"><h1>投资工具箱</h1></div>
            <div class="hero-actions"></div>
        </div>
        <div class="nav-pills-bar">
            <a class="nav-chip" href="/">组合</a>
            <a class="nav-chip" href="/monitor">监控</a>
            <a class="nav-chip is-active" href="/tools">工具</a>
            <a class="nav-chip" href="/xueqiu">组合</a>
            <a class="nav-chip" href="/analysis">分析</a>
            <a class="nav-chip" href="/learn">学习</a>
            <a class="nav-chip" href="/admin">数据管理</a>
        </div>
    </section>

    <section class="surface section">
        <div class="row g-4">
            <div class="col-lg-6">
                <div class="panel-card h-100">
                    <div class="panel-card-header"><div><h4>成本计算器</h4></div></div>
                    <div class="panel-card-body">
                        <div class="mb-3">
                            <label class="form-label">选择持仓股票（可选）</label>
                            <select id="stock-select" class="form-select"><option value="">-- 自定义输入 --</option></select>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">股票名称</label>
                            <input type="text" id="custom-name" class="form-control" placeholder="可自定义显示名称">
                        </div>
                        <div id="positions-container"></div>
                        <div class="d-flex gap-2 flex-wrap mt-3">
                            <button class="btn btn-outline-secondary" onclick="addPosition()">添加记录</button>
                            <button class="btn btn-primary" onclick="calculate()">开始计算</button>
                        </div>
                        <div id="result-container" class="mt-4" style="display:none;">
                            <div class="table-wrap">
                                <table class="table-modern">
                                    <thead><tr><th>股票</th><th class="text-end">总持仓</th><th class="text-end">平均成本</th><th class="text-end">总投入</th></tr></thead>
                                    <tbody><tr><td id="result-name">-</td><td class="text-end mono" id="result-shares">-</td><td class="text-end mono" id="result-cost">-</td><td class="text-end mono" id="result-total">-</td></tr></tbody>
                                </table>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
            <div class="col-lg-6">
                <div class="panel-card h-100">
                    <div class="panel-card-header"><div><h4>K 线导出</h4></div></div>
                    <div class="panel-card-body">
                        <div class="mb-3">
                            <label class="form-label">选择股票</label>
                            <select id="export-stock-select" class="form-select"><option value="">-- 请选择 --</option></select>
                            <div class="form-text" id="stock-info"></div>
                        </div>
                        <div class="row g-3">
                            <div class="col-md-6"><label class="form-label">导出格式</label><select id="export-format" class="form-select"><option value="csv">CSV</option><option value="excel">Excel</option></select></div>
                            <div class="col-md-6"><label class="form-label">开始日期</label><input type="date" id="export-start-date" class="form-control"></div>
                            <div class="col-md-6"><label class="form-label">结束日期</label><input type="date" id="export-end-date" class="form-control"></div>
                        </div>
                        <div class="d-flex gap-2 flex-wrap mt-4">
                            <button class="btn btn-success" onclick="exportKline()" id="export-btn">导出数据</button>
                            <button class="btn btn-outline-secondary" onclick="resetExport()">重置</button>
                        </div>
                        <div id="export-result" class="mt-3" style="display:none;"></div>
                    </div>
                </div>
            </div>
        </div>
    </section>
</div>
<script>
let positionIndex = 0;
let portfolioStocks = [];
function createPositionRow(index, price = '', shares = '') {
    const node = document.createElement('div');
    node.className = 'form-panel mb-3 position-row';
    node.dataset.index = index;
    node.innerHTML = `<div class="row g-3 align-items-end"><div class="col-md-5"><label class="form-label">买入价格</label><input type="number" class="form-control price-input" step="0.01" value="${price}" placeholder="例如 10.50"></div><div class="col-md-5"><label class="form-label">买入股数</label><input type="number" class="form-control shares-input" step="1" value="${shares}" placeholder="例如 1000"></div><div class="col-md-2"><button class="btn btn-outline-danger w-100" onclick="removePosition(${index})">删除</button></div></div>`;
    return node;
}
function addPosition(price = '', shares = '') { document.getElementById('positions-container').appendChild(createPositionRow(positionIndex++, price, shares)); }
function removePosition(index) { const rows = document.querySelectorAll('.position-row'); if (rows.length === 1) return showToast('至少保留一条买入记录', 'info'); document.querySelector(`.position-row[data-index="${index}"]`)?.remove(); }
async function loadPortfolioStocks() { try { const response = await fetch('/api/portfolio'); const data = await response.json(); if (data.status === 'success') { portfolioStocks = data.rows; const select = document.getElementById('stock-select'); data.rows.forEach(stock => { const option = document.createElement('option'); option.value = stock.code; option.textContent = `${stock.name} (${stock.code})`; option.dataset.shares = stock.shares; option.dataset.price = stock.cost_price; option.dataset.name = stock.name; select.appendChild(option); }); } } catch (error) { console.error(error); } }
document.getElementById('stock-select').addEventListener('change', function(){ const container = document.getElementById('positions-container'); container.innerHTML = ''; positionIndex = 0; if (this.value) { const option = this.options[this.selectedIndex]; document.getElementById('custom-name').value = option.dataset.name; addPosition(option.dataset.price, option.dataset.shares); } else { document.getElementById('custom-name').value = ''; addPosition(); } });
function calculate() { const rows = document.querySelectorAll('.position-row'); let totalShares = 0, totalCost = 0, valid = true; rows.forEach(row => { const price = parseFloat(row.querySelector('.price-input').value); const shares = parseInt(row.querySelector('.shares-input').value); if (!price || !shares || price <= 0 || shares <= 0) valid = false; else { totalShares += shares; totalCost += price * shares; } }); if (!valid) return showToast('请填写有效的价格和股数', 'error'); const avgCost = totalCost / totalShares; const stockName = document.getElementById('custom-name').value.trim() || '未命名股票'; document.getElementById('result-name').textContent = stockName; document.getElementById('result-shares').textContent = `${totalShares.toLocaleString()} 股`; document.getElementById('result-cost').textContent = avgCost.toLocaleString('zh-CN',{minimumFractionDigits:2,maximumFractionDigits:2}); document.getElementById('result-total').textContent = totalCost.toLocaleString('zh-CN',{minimumFractionDigits:2,maximumFractionDigits:2}); document.getElementById('result-container').style.display = 'block'; showToast('计算完成', 'success'); }
async function loadExportStocks() { try { const response = await fetch('/api/tools/export-kline/stocks'); const data = await response.json(); if (data.status === 'success') { const select = document.getElementById('export-stock-select'); data.data.forEach(stock => { const option = document.createElement('option'); option.value = stock.code; option.textContent = `${stock.name} (${stock.code})`; option.dataset.latestDate = stock.latest_date || '暂无'; select.appendChild(option); }); } } catch (error) { console.error(error); } }
document.getElementById('export-stock-select').addEventListener('change', function(){ const option = this.options[this.selectedIndex]; document.getElementById('stock-info').textContent = this.value ? `最新数据日期：${option.dataset.latestDate}` : ''; });
async function exportKline() { const code = document.getElementById('export-stock-select').value; const format = document.getElementById('export-format').value; const startDate = document.getElementById('export-start-date').value; const endDate = document.getElementById('export-end-date').value; const btn = document.getElementById('export-btn'); const resultDiv = document.getElementById('export-result'); if (!code) return showToast('请选择要导出的股票', 'info'); btn.disabled = true; btn.innerHTML = '<span class="spinner-border spinner-border-sm"></span> 导出中'; try { const response = await fetch('/api/tools/export-kline', { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({ code, format, start_date: startDate || null, end_date: endDate || null }) }); if (response.ok) { const blob = await response.blob(); const url = window.URL.createObjectURL(blob); const a = document.createElement('a'); a.href = url; a.download = response.headers.get('Content-Disposition')?.split('filename=')[1] || `kline.${format==='csv'?'csv':'xlsx'}`; document.body.appendChild(a); a.click(); window.URL.revokeObjectURL(url); a.remove(); resultDiv.innerHTML = '<div class="alert alert-success">导出成功</div>'; showToast('导出成功', 'success'); } else { const error = await response.json(); resultDiv.innerHTML = `<div class="alert alert-danger">导出失败：${error.detail || error.message || '未知错误'}</div>`; showToast(error.detail || error.message || '导出失败', 'error'); } resultDiv.style.display = 'block'; } catch (error) { resultDiv.innerHTML = '<div class="alert alert-danger">导出失败：网络错误</div>'; resultDiv.style.display = 'block'; showToast('导出失败：网络错误', 'error'); } finally { btn.disabled = false; btn.innerHTML = '导出数据'; } }
function resetExport() { document.getElementById('export-stock-select').value = ''; document.getElementById('export-format').value = 'csv'; document.getElementById('export-start-date').value = ''; document.getElementById('export-end-date').value = ''; document.getElementById('stock-info').textContent = ''; document.getElementById('export-result').style.display = 'none'; }
document.addEventListener('DOMContentLoaded', () => { addPosition(); loadPortfolioStocks(); loadExportStocks(); });
</script>
<script src="/static/ui.js"></script>
</body>
</html>
